; PlatformIO Project Configuration File — cardputer-atari800
; https://docs.platformio.org/page/projectconf.html

[env:cardputer-adv]
platform = espressif32
framework = arduino
board = m5stack-cardputer

; serial / USB
monitor_speed = 115200
upload_speed = 921600

; C / C++ standards
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=3
  ; CRITICAL: this define MUST match lib/atari800/library.json's -DCARDPUTER_ATARI800
  ; so main.cpp sees MEMORY_mem / MEMORY_attrib as POINTERS (same as the library)
  ; rather than arrays. Mismatch causes main.cpp's MEMORY_mem[addr] writes to go to
  ; the wrong DRAM location — corrupting neighboring globals like under_atarixl_os.
  -DCARDPUTER_ATARI800

; libraries
lib_deps =
  m5stack/M5Cardputer@^1.0.3

; deep+ mode scans all sources for includes and builds all discovered libs,
; including local libs in lib/ referenced via relative paths in main.cpp
lib_ldf_mode = deep+

; flash / filesystem
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
